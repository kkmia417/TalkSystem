name: Package Validation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "CHANGELOG.md"
      - "LICENSE"
      - "Tools/Validate-Package.ps1"
      - "Tools/Assert-NoUnguardedLegacyInput.ps1"
      - "Tools/Validate-ConsumerInstall.ps1"
      - "Tools/Invoke-ReleaseChecks.ps1"
      - "Documentation~/index.md"
      - "Documentation~/release-checklist.md"
      - "Samples~/**"
      - "Assets/kkmia/TalkSystem/Scripts/kkmia.TalkSystem.Runtime.asmdef"
      - "Assets/kkmia/TalkSystem/Editor/kkmia.TalkSystem.Editor.asmdef"
      - "Assets/kkmia/TalkSystem/Tests/Editor/kkmia.TalkSystem.Tests.asmdef"
      - "Assets/kkmia/TalkSystem/Tests/PlayMode/kkmia.TalkSystem.PlayModeTests.asmdef"
      - "Assets/kkmia/TalkSystem/Demo/**"
      - ".github/workflows/package-validation.yml"
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "CHANGELOG.md"
      - "LICENSE"
      - "Tools/Validate-Package.ps1"
      - "Tools/Assert-NoUnguardedLegacyInput.ps1"
      - "Tools/Validate-ConsumerInstall.ps1"
      - "Tools/Invoke-ReleaseChecks.ps1"
      - "Documentation~/index.md"
      - "Documentation~/release-checklist.md"
      - "Samples~/**"
      - "Assets/kkmia/TalkSystem/Scripts/kkmia.TalkSystem.Runtime.asmdef"
      - "Assets/kkmia/TalkSystem/Editor/kkmia.TalkSystem.Editor.asmdef"
      - "Assets/kkmia/TalkSystem/Tests/Editor/kkmia.TalkSystem.Tests.asmdef"
      - "Assets/kkmia/TalkSystem/Tests/PlayMode/kkmia.TalkSystem.PlayModeTests.asmdef"
      - "Assets/kkmia/TalkSystem/Demo/**"
      - ".github/workflows/package-validation.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Package Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate package files
        shell: pwsh
        run: ./Tools/Validate-Package.ps1

  consumer-install:
    name: Clean Consumer Install
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: old-no-input-system
            activeInputHandler: 0
            inputSystem: false
          - name: new-input-system
            activeInputHandler: 1
            inputSystem: true
          - name: both-input-system
            activeInputHandler: 2
            inputSystem: true
    steps:
      - uses: actions/checkout@v4

      - name: Check Unity credentials
        id: unity_credentials
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          if [ -n "$UNITY_LICENSE" ] || { [ -n "$UNITY_SERIAL" ] && [ -n "$UNITY_EMAIL" ] && [ -n "$UNITY_PASSWORD" ]; }; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip clean consumer install
        if: steps.unity_credentials.outputs.available != 'true'
        run: echo "Unity license secrets are not configured; skipping clean consumer install."

      - name: Create clean consumer project
        if: steps.unity_credentials.outputs.available == 'true'
        shell: pwsh
        run: |
          $project = Join-Path $PWD "ConsumerProject"
          New-Item -ItemType Directory -Path "$project/Assets/Tests/Editor" -Force | Out-Null
          New-Item -ItemType Directory -Path "$project/Packages" -Force | Out-Null
          New-Item -ItemType Directory -Path "$project/ProjectSettings" -Force | Out-Null

          $packagePath = (Resolve-Path ".").Path.Replace("\", "/")
          @{
            dependencies = [ordered]@{
              "com.kkmia.talksystem" = "file:$packagePath"
              "com.unity.test-framework" = "1.6.0"
            }
          } | ConvertTo-Json -Depth 8 | Set-Content -Path "$project/Packages/manifest.json" -Encoding UTF8

          $manifest = Get-Content "$project/Packages/manifest.json" -Raw | ConvertFrom-Json
          if ("${{ matrix.inputSystem }}" -eq "true") {
            $manifest.dependencies | Add-Member -NotePropertyName "com.unity.inputsystem" -NotePropertyValue "1.11.2"
            $manifest | ConvertTo-Json -Depth 8 | Set-Content -Path "$project/Packages/manifest.json" -Encoding UTF8
          }

          @"
          m_EditorVersion: 6000.0.40f1
          m_EditorVersionWithRevision: 6000.0.40f1
          "@ | Set-Content -Path "$project/ProjectSettings/ProjectVersion.txt" -Encoding UTF8

          $settings = Get-Content "ProjectSettings/ProjectSettings.asset" -Raw
          $settings = [regex]::Replace($settings, 'activeInputHandler:\s*\d+', "activeInputHandler: ${{ matrix.activeInputHandler }}")
          $settings | Set-Content -Path "$project/ProjectSettings/ProjectSettings.asset" -Encoding UTF8

          @"
          using System.Linq;
          using NUnit.Framework;
          using UnityEditor;
          using UnityEditor.PackageManager;
          using UnityEditor.PackageManager.UI;
          using kkmia.TalkSystem;

          public sealed class TalkSystemConsumerCompileTests
          {
              [Test]
              public void RuntimeApi_IsAccessibleFromCleanConsumerProject()
              {
                  Assert.AreEqual("kkmia.TalkSystem.DialogueManager", typeof(DialogueManager).FullName);
                  Assert.IsNotNull(new DialogueSaveData().Progress);
                  Assert.AreEqual("kkmia.TalkSystem.DialogueKeyboardInput", typeof(DialogueKeyboardInput).FullName);
                  Assert.IsFalse(DialogueKeyboard.GetKeyDown(DialogueKeyCode.None));
              }

              [Test]
              public void FeatureTourSample_IsImportable()
              {
                  var packageInfo = PackageInfo.FindForPackageName("com.kkmia.talksystem");
                  Assert.IsNotNull(packageInfo);

                  var sample = Sample.FindByPackage(packageInfo.name, packageInfo.version)
                      .FirstOrDefault(item => item.displayName == "Feature Tour");
                  Assert.IsNotNull(sample);

                  sample.Import(Sample.ImportOptions.OverridePreviousImports);
                  AssetDatabase.Refresh();
                  Assert.IsTrue(AssetDatabase.FindAssets("dialogue_feature_tour").Length > 0);
              }
          }
          "@ | Set-Content -Path "$project/Assets/Tests/Editor/TalkSystemConsumerCompileTests.cs" -Encoding UTF8

      - name: Run clean consumer compile/import tests
        if: steps.unity_credentials.outputs.available == 'true'
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.0.40f1
          projectPath: ConsumerProject
          testMode: EditMode
          artifactsPath: consumer-test-results

      - name: Upload Consumer Test Results
        uses: actions/upload-artifact@v4
        if: always() && steps.unity_credentials.outputs.available == 'true'
        with:
          name: clean-consumer-results-${{ matrix.name }}
          path: consumer-test-results
